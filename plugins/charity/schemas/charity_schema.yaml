type: map
mapping:
  DEFAULT:
    type: map
    nullable: false
    mapping:
      bot_status: {type: bool, nullable: false}
      gofundme:
        type: seq
        nullable: false
        sequence:
          - type: map
            mapping:
              campaign: {type: str, required: true}
              channel: {type: any, required: true}
              interval: {type: int}
  commands:
    include: 'commands_schema'
  "regex;(.+)":
    type: map
    mapping:
      campaigns:
        type: seq
        sequence:
          - type: str
